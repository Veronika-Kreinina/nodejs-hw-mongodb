description: Not Found – The requested resource does not exist
content:
  application/json:
    schema:
      type: object
       required:
        - status
        - message
        - data
      properties:
        status:
          type: integer
          example: 404
        message:
          type: string
          example: Not Found Error
        data:
          type: string
          example: 'Contact not found'