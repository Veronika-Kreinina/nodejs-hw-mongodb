openapi: 3.1.0
info:
  version: 1.0.0
  title: Contacts Application
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  description:
    RESTful API for managing personal contacts. Users can register, log in, and perform CRUD operations
    on their contacts. The API uses token-based authentication via access and refresh tokens stored in sessions.
    Built with Node.js, Express, and MongoDB.
tags:
  - name: Contacts
  description: Operations with contacts
  - name: User
  description: Operations with users
  - name: Session
  description: Operations with sessions

servers:
  - url: http://localhost:3000
    description: Local server
  - url: https://your-deployment-url.com
    description: Production server
paths:
  /contacts/{contactId}:
    get:
      $ref: ../swagger/paths/contacts/{contactId}/get.yaml
      patch:
      $ref: ../swagger/paths/contacts/{contactId}/patch.yaml
    put:
      $ref: ../swagger/paths/contacts/{contactId}/put.yaml
    delete:
      $ref: ../swagger/paths/contacts/{contactId}/delete.yaml

  /contacts:
    get:
      $ref: ../swagger/paths/contacts/get.yaml
    post: 
      $ref: ../swagger/paths/contacts/get.yaml

#  /users/register:
#     post:
#       $ref: ./paths/users/register.yaml

#   /users/login:
#     post:
#       $ref: ./paths/users/login.yaml

#   /users/logout:
#     post:
#       $ref: ./paths/users/logout.yaml

#   /sessions/refresh:
#     post:
