openapi: 3.1.0
info:
  version: 1.0.0
  title: Contacts Application
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  description:
    RESTful API for managing personal contacts. Users can register, log in, and perform CRUD operations
    on their contacts. The API uses token-based authentication via access and refresh tokens stored in sessions.
    Built with Node.js, Express, and MongoDB.
tags:
  - name: Contacts
    description: Operations with contacts
  - name: Auth
    description: Auth operations.

servers:
  - url: http://127.0.0.1:3000
    description: Local server
  - url: https://contacts-app-l60g.onrender.com
    description: Production server
paths:
  /contacts:
    get:
      $ref: ../swagger/paths/contacts/get.yaml
    post:
      $ref: ../swagger/paths/contacts/post.yaml
  /contacts/{contactId}:
    get:
      $ref: ../swagger/paths/contacts/{contactId}/get.yaml
    patch:
      $ref: ../swagger/paths/contacts/{contactId}/patch.yaml
    put:
      $ref: ../swagger/paths/contacts/{contactId}/put.yaml
    delete:
      $ref: ../swagger/paths/contacts/{contactId}/delete.yaml
  /auth/register:
    post:
      $ref: ../swagger/paths/auth/register.yaml

  /auth/login:
    post:
      $ref: ../swagger/paths/auth/login.yaml

  /auth/logout:
    post:
      $ref: ../swagger/paths/auth/logout.yaml

  /auth/refresh:
    post:
      $ref: ../swagger/paths/auth/refresh.yaml

  /auth/send-reset-email:
    post:
      $ref: ../swagger/paths/auth/send-reset-email.yaml

  /auth/reset-pwd:
    post:
      $ref: ../swagger/paths/auth/reset-pwd.yaml

  /auth/confirm-oauth:
    post:
      $ref: ../swagger/paths/auth/confirm-oauth.yaml
  /auth/get-oauth-url:
    get:
      $ref: ../swagger/paths/auth/get-oauth-url.yaml

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
