tags:
  - Contacts
summary: Delete a contact
operationId: deleteContact
description: |
   Deletes a contact by its ID. Only the owner of the contact can delete it.

security:
  - bearerAuth: []
parameters:
  - in: path
    name: contactId
    required: true
    schema:
      type: string
    example: 661a2cd3c991f1a9fba1dce1
    description: The ID of the contact to delete
responses:

  '204':
    description: Contact successfully deleted (no content)
    
      '401':
        description: Unauthorized 
        $ref: ../../../components/responses/401.yaml

      '404':
        description: Contact with the specified ID was not found
        $ref: ../../../components/responses/404.yaml

        '500':
        description: Internal Server Error
        $ref: ../../../components/responses/500.yaml