tags:
  - Auth
security: []
summary: Request password reset
operationId: requestPasswordReset
description: Send an email with a reset password token if the user exists
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - email
        properties:
          email:
            type: string
            description: Registered user's email
            example: alice.johnson@example.com
responses:
  '200':
    description: Password reset email sent
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Reset password email has been successfully sent.
            data:
              type: object
              example: {}
  '404':
    description: User not found
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: User not found
            data:
              type: object
              example: {}
  '500':
    $ref: ../../components/responses/500.yaml
