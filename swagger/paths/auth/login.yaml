tags:
    - Auth
security: []
summary: Log in user
operationId: login
description: Log in a user with email and password
requestBody:
    content:
      application/json:
        schema:
          type: object
          required:
            - email
            - password
          properties:
            email:
              type: string
              description: Contact's  email
              format: email
              example: alice.johnson@example.com
            password:
              type: string
              description: User's password
              example: qwerty1234
responses:
    '200':
      description: Login successful
      content:
        application/json:
          schema:
            type: object
            required:
              - status
              - message
              - data
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: Successfully logged in an user!
              data:
                type: object
                properties:
                  accessToken:
                    type: string
                    example: sr9r/0qMg4FsrB+SyYl5rxNpQ7Lu91Hk3yX5pTbq
    '401':
      $ref: '../../components/responses/401.yaml'
    '500':
      $ref: '../../components/responses/500.yaml'