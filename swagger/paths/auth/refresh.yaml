tags:
  - Auth
security: []
summary: Refresh session
operationId: refresh
description: Refresh user session using sessionId and refreshToken cookies
responses:
  '200':
    description: Session refreshed
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully refreshed a session!
            data:
              type: object
              properties:
                accessToken:
                  type: string
                  example: sr9r/0qMg4FsrB+SyYl5rxNpQ7Lu91Hk3yX5pTbq
  '401':
    $ref: '../../components/responses/401.yaml'
  '500':
    $ref: '../../components/responses/500.yaml'
