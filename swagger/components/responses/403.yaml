description: Forbidden – You do not have permission to access this resource
  content:
    application/json:
      schema:
        type: object
        required:
          - status
          - message
          - data
        properties:
          status:
            type: integer
            example: 403
          message:
            type: string
            example: 'Forbidden'
          data:
            type: string
            example: 'access_denied'